name: mail-send
on:
  schedule:
    - cron: "0 4 * * 0" # Sundays 04:00 UTC
  workflow_dispatch: {} # manual trigger from the Actions tab

concurrency:
  group: mail-send
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest send
        env:
          MAIL_URL: ${{ secrets.MAIL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
            -X POST "$MAIL_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 60 --retry 2 --retry-delay 10)
          echo "HTTP $code"
          cat /tmp/body.json || true
          echo
          test "$code" = "200"
