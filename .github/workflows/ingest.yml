name: ingest

# The `schedule:` trigger is COMMENTED OUT on purpose. GitHub's hosted cron is
# best-effort and heavily deprioritizes free-tier scheduled runs — observed
# drift: a 3h interval fired at 04:21 then 09:12 (~5h gap). On a paid GitHub
# plan (Pro/Team/Enterprise) scheduled runs are prioritized and reliable, so if
# you're on one of those, just uncomment the two `schedule:` lines below and you
# don't need an external scheduler. On the free tier, leave it commented and use
# an external cron (EasyCron etc.) pointed at the same endpoint — see README.

on:
  # schedule:
  #   - cron: "0 */6 * * *" # every 6 hours, UTC (uncomment on a paid GitHub plan)
  workflow_dispatch: {} # manual trigger from the Actions tab

# Don't pile up overlapping runs if one is slow.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ingest endpoint
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/body.json -w "%{http_code}" \
            -X POST "$INGEST_URL" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 90 --retry 2 --retry-delay 10)
          echo "HTTP $code"
          echo "Response body:"
          cat /tmp/body.json || true
          echo
          # Fail the job (red X in the Actions log) on any non-200.
          test "$code" = "200"
